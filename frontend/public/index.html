<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yash Kumar Sharma - AI Engineer | Machine Learning Developer | IoT Developer. JARVIS-inspired futuristic portfolio." />
    <meta name="keywords" content="AI Engineer, Machine Learning, IoT, Python, Portfolio, Yash Kumar Sharma" />
    <meta name="author" content="Yash Kumar Sharma" />
    <meta property="og:title" content="JARVIS | Yash Kumar Sharma - AI Engineer" />
    <meta property="og:description" content="Futuristic JARVIS-inspired portfolio of an AI Engineer specializing in ML, DL, and IoT." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#050816" />
    <title>JARVIS | Yash Kumar Sharma - AI Engineer</title>

    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Prevent FOUC */
      body {
        background-color: #050816;
        margin: 0;
        overflow: hidden;
      }

      #root {
        min-height: 100vh;
      }

      /* Initial loader before React mounts */
      .pre-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050816;
        z-index: 10000;
      }

      .pre-loader-text {
        font-family: 'Courier New', monospace;
        color: #00F5FF;
        font-size: 14px;
        letter-spacing: 4px;
        animation: preLoaderPulse 1.5s ease-in-out infinite;
      }

      @keyframes preLoaderPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="pre-loader">
        <div class="pre-loader-text">INITIALIZING JARVIS...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
